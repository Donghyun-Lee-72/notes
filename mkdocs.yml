site_name: AI Notes
site_description: Clear, source-linked notes on language models, agents, retrieval, and evaluation.
site_url: https://ai-notes.donghyunlee.me/
repo_url: https://github.com/Donghyun-Lee-72/ai-notes
site_author: Donghyun Lee
copyright: Maintained by Donghyun Lee
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Start: 시작
            Foundations: 기초
            Large Language Models: 대규모 언어 모델
            Tokenization: 토큰화
            Context Windows: 컨텍스트 윈도
            Transformers: Transformer
            Embeddings: 임베딩
            Prompting: 프롬프팅
            Build: 구축
            AI Agents: AI Agent
            Workflows and Agents: Workflow와 Agent
            Agent Memory: Agent Memory
            Tool Use and Function Calling: 도구 사용과 함수 호출
            Structured Output: 구조화 출력
            Retrieval-Augmented Generation: 검색 증강 생성
            Reranking: 재순위화
            Pydantic: Pydantic
            LangChain and LangGraph: LangChain과 LangGraph
            Vector Databases: 벡터 데이터베이스
            Evaluate: 평가
            Grounding and Hallucination: 근거성과 환각
            LLM Evaluation: LLM 평가
            RAG Evaluation: RAG 평가
            Reference: 참고
            Glossary: 용어집
            References: 참고문헌
            About: 소개
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
extra_css:
  - assets/stylesheets/navigation.css
extra_javascript:
  - assets/javascripts/navigation.js
  - assets/javascripts/site-analytics.js
nav:
  - Start: index.md
  - Foundations:
      - Large Language Models: learn/large-language-models.md
      - Tokenization: learn/tokenization.md
      - Transformers: learn/transformers.md
      - Context Windows: learn/context-windows.md
      - Embeddings: learn/embeddings.md
      - Prompting: learn/prompting.md
  - Build:
      - AI Agents: build/ai-agents.md
      - Workflows and Agents: build/workflows-and-agents.md
      - Agent Memory: build/agent-memory.md
      - Tool Use and Function Calling: build/tool-use-and-function-calling.md
      - Structured Output: build/structured-output.md
      - Retrieval-Augmented Generation: build/retrieval-augmented-generation.md
      - Reranking: build/reranking.md
      - Pydantic: tools/pydantic.md
      - LangChain and LangGraph: tools/langchain-langgraph.md
      - Vector Databases: tools/vector-databases.md
  - Evaluate:
      - Grounding and Hallucination: evaluate/grounding-and-hallucination.md
      - LLM Evaluation: evaluate/llm-evaluation.md
      - RAG Evaluation: evaluate/rag-evaluation.md
  - Reference:
      - Glossary: glossary.md
      - References: references.md
      - About: about.md
